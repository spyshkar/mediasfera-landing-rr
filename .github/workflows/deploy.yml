name: Deploy to Beget

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Собрать файлы для деплоя
        run: |
          mkdir dist
          cp index-v4.html dist/index.html
          cp submit.php dist/
          cp team-*.jpg dist/ 2>/dev/null || true
          cp *.svg dist/ 2>/dev/null || true

      - name: Деплой на Beget через SFTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: svetlauz.beget.tech
          username: svetlauz
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /text.svetlauz.beget.tech/public_html/
